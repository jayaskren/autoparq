name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    name: Build wheels - ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            manylinux: auto
            args: ""
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            manylinux: auto
            args: "--zig"
          - os: macos-13
            target: x86_64-apple-darwin
            manylinux: ""
            args: ""
          - os: macos-14
            target: aarch64-apple-darwin
            manylinux: ""
            args: ""
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            manylinux: ""
            args: ""

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate aarch64 Linux build (pre-flight check)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          pip install maturin ziglang
          maturin build --release --strip --zig --target aarch64-unknown-linux-gnu --manylinux auto
          # Verify the wheel is non-empty
          WHEEL=$(find target/wheels -name "*.whl" | head -1)
          if [ -z "$WHEEL" ] || [ ! -s "$WHEEL" ]; then
            echo "ERROR: aarch64 wheel is empty or missing" && exit 1
          fi
          echo "aarch64 wheel OK: $(du -sh $WHEEL)"

      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          manylinux: ${{ matrix.manylinux }}
          args: --release --strip ${{ matrix.args }}

      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.target }}
          path: dist/*.whl

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    permissions:
      id-token: write

    steps:
      - name: Download all wheels
        uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          merge-multiple: true
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}
